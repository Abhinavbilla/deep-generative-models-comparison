model_params:
  name: "InfoVAE"
  in_channels: 3
  latent_dim: 128

data_params:
  dataset: "celeba"
  data_path: "./data/celeba"   
  train_batch_size: 64
  val_batch_size: 64
  image_size: 64
  num_workers: 4

exp_params:
  LR: 0.0001
  weight_decay: 0.0
  alpha: 0.0
  beta: 10.0
  reg_weight: 50.0
  perceptual_weight: 0.1
  manual_seed: 1265

trainer_params:
  max_epochs: 50
  gpus: [0]
